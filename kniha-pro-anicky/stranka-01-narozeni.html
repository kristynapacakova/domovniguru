<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Den, kdy ses narodila — Kniha pro Aničku</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Pinyon+Script&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d6d2cc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .page {
      width: 600px;
      min-height: 700px;
      background-color: #f4f3f0;
      background-image: radial-gradient(circle, #b8b4ae 1px, transparent 1px);
      background-size: 16px 16px;
      padding: 52px 56px 52px 56px;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    }

    /* Kaligrafický nadpis */
    .title {
      font-family: 'Pinyon Script', cursive;
      font-size: 52px;
      color: #1e1e1e;
      text-align: center;
      margin-bottom: 38px;
      line-height: 1.1;
    }

    /* Oblast otázek */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }

    /* Jedna otázka */
    .q {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: #1e1e1e;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .q strong {
      font-style: italic;
      font-weight: 600;
    }

    /* Volné místo pro psaní */
    .space { margin-bottom: 36px; }
    .space-lg { margin-bottom: 52px; }

    /* Řádek s otázkou + datum vpravo */
    .q-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .q-date {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: #1e1e1e;
    }

    /* Spodní polovina — foto + citát vedle sebe */
    .bottom-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: 12px;
    }

    /* Dekorativní kaligrafický citát vlevo dole */
    .deco-quote {
      font-family: 'Pinyon Script', cursive;
      font-size: 26px;
      color: #1e1e1e;
      line-height: 1.55;
      max-width: 220px;
    }

    /* Placeholder na fotku */
    .photo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .photo-label {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: #1e1e1e;
      align-self: flex-start;
    }

    .photo-label strong {
      font-style: italic;
      font-weight: 600;
    }

    .photo-box {
      width: 180px;
      height: 130px;
      border: 1px solid #9a9690;
      border-radius: 6px;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="title">Den, kdy ses narodila</div>

    <div class="fields">

      <div class="q">Přišla jsi na svět dne</div>
      <div class="space"></div>

      <div class="q-row">
        <div class="q">Kdy jsem tě <strong>poprvé uviděla</strong></div>
        <div class="q-date">Datum:</div>
      </div>
      <div class="space"></div>

      <div class="q">Nikdy nezapomenu na</div>
      <div class="space"></div>

      <div class="q">Vážila jsi &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a měřila jsi</div>
      <div class="space"></div>

      <div class="q">První věc, kterou jsem řekla, <strong>když jsem tě uviděla</strong></div>
      <div class="space-lg"></div>

    </div>

    <div class="bottom-row">
      <div class="deco-quote">
        Tehdy se pro nás<br>
        zkomplilovalo<br>
        slovo láska
      </div>
      <div class="photo-area">
        <div class="photo-label">Tvoje <strong>první fotka</strong></div>
        <div class="photo-box"></div>
      </div>
    </div>

  </div>
</body>
</html>
